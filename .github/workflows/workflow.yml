name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install -D @commitlint/cli @commitlint/config-conventional
      - name: Validate current commit (last commit) with commitlint
        if: github.event_name == 'push'
        run: npx commitlint --last --verbose
      - name: Validate PR commits with commitlint
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run ruff check
        run: uvx ruff check src/ tests/
      - name: Run ruff format check
        run: uvx ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Run ty type check
        run: uvx ty check src/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [commitlint, test, lint, typecheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      new_release_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Get latest tag before release
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: npm install -D semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # uv publish uses the OIDC token automatically when id-token: write
          # is set — no UV_PUBLISH_TOKEN needed with Trusted Publishing.
        run: npx semantic-release
      - name: Check if a new release was created
        id: check
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          BEFORE_TAG="${{ steps.before.outputs.tag }}"
          if [ "$LATEST_TAG" != "$BEFORE_TAG" ] && [ -n "$LATEST_TAG" ]; then
            echo "version=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    name: Build binary (${{ matrix.platform.name }})
    needs: [release]
    if: needs.release.outputs.new_release_version != ''
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            runner: macos-latest
          - name: Linux (x86_64)
            runner: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Install PyInstaller
        run: uv pip install pyinstaller
      - name: Build binary
        run: uv run python build_binary.py
      - name: Verify binary runs
        run: |
          ./dist/fr/fr --version
          ./dist/fr/fr --help
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: gh release upload "v${RELEASE_VERSION}" dist/fast-resume-plus-*.tar.gz --clobber
